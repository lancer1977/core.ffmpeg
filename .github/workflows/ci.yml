name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run TypeScript tests
        run: npm test

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore .NET dependencies
        run: dotnet restore dotnet/core.ffmpeg.sln

      - name: Build .NET solution
        run: dotnet build dotnet/core.ffmpeg.sln -c Release --no-restore

      - name: Build .NET test project
        run: dotnet build dotnet/test/Core.FFmpeg.Tests/Core.FFmpeg.Tests.csproj -c Release --no-restore

      - name: Run .NET test executable
        run: dotnet dotnet/test/Core.FFmpeg.Tests/bin/Release/net10.0/Core.FFmpeg.Tests.dll
